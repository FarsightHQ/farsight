services:
  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: farsight_postgres
    environment:
      # Single database configuration
      POSTGRES_DB: ${POSTGRES_DB:-farsight}
      POSTGRES_USER: ${POSTGRES_USER:-farsight_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - farsight_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-farsight_user} -d ${POSTGRES_DB:-farsight}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Keycloak - Authentication Server
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: farsight_keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-farsight}
      KC_DB_USERNAME: ${POSTGRES_USER:-farsight_user}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - farsight_network
    restart: unless-stopped
    command: start-dev
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Python Backend Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farsight_backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PYTHONPATH: ${PYTHONPATH:-/app}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-farsight}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-farsight-backend}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - farsight_network
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # pgAdmin - Database Viewer
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: farsight_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@farsight.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_CONFIG_WTF_CSRF_ENABLED: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    user: root
    depends_on:
      - postgres
    networks:
      - farsight_network
    restart: unless-stopped

  # Swagger UI - API Documentation
  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: farsight_swagger
    environment:
      SWAGGER_JSON_URL: ${SWAGGER_JSON_URL:-http://localhost:8000/openapi.json}
      API_URL: ${API_URL:-http://localhost:8000/openapi.json}
      BASE_URL: ${BASE_URL:-/swagger}
    ports:
      - "${SWAGGER_PORT:-8081}:8080"
    depends_on:
      - backend
    networks:
      - farsight_network
    restart: unless-stopped

  # SigNoz Observability Stack
  
  # ClickHouse Zookeeper - Required for ClickHouse coordination
  clickhouse-zookeeper:
    image: zookeeper:3.9
    container_name: farsight_clickhouse_zookeeper
    networks:
      - farsight_network
    restart: unless-stopped

  # ClickHouse - Storage backend for traces, metrics, and logs
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: farsight_clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-signoz}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ports:
      - "${CLICKHOUSE_PORT:-8123}:8123"  # HTTP interface
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"  # Native protocol
    depends_on:
      clickhouse-zookeeper:
        condition: service_started
    networks:
      - farsight_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # OTEL Collector - Receives telemetry data from application services
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: farsight_otel_collector
    command: ["--config=/etc/otel-collector/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otel-collector/config.yaml:ro
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"  # OTLP gRPC receiver
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"  # OTLP HTTP receiver
      - "${OTEL_COLLECTOR_METRICS_PORT:-8888}:8888"  # Prometheus metrics endpoint
    depends_on:
      clickhouse:
        condition: service_started
    networks:
      - farsight_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SigNoz Query Service - Processes queries from UI
  signoz-query-service:
    image: signoz/query-service:latest
    container_name: farsight_signoz_query_service
    environment:
      ALERTMANAGER_API_PREFIX: ""
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DB:-signoz}
      CLICKHOUSE_USERNAME: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      DASHBOARDS_PATH: /root/signoz/tests/dashboards
      PROM_QUERY_PORT: 8080
      PROM_QUERY_PREFIX: /api/v1
      STORAGE: clickhouse
      TELEMETRY_ENABLED: "false"
    ports:
      - "${SIGNOZ_QUERY_SERVICE_PORT:-8082}:8080"
    volumes:
      - signoz_data:/var/lib/signoz
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - farsight_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # SigNoz Frontend UI - Web dashboard
  signoz-frontend:
    image: signoz/frontend:latest
    container_name: farsight_signoz_frontend
    environment:
      REACT_APP_API_BASE_URL: http://localhost:8082
      REACT_APP_BASE_URL: http://localhost:3301
      REACT_APP_ENABLE_ANALYTICS: "false"
    ports:
      - "${SIGNOZ_UI_PORT:-3301}:3301"
    depends_on:
      signoz-query-service:
        condition: service_healthy
    networks:
      - farsight_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3301 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  pgadmin_data:
  clickhouse_data:
  clickhouse_logs:
  signoz_data:

networks:
  farsight_network:
    driver: bridge
