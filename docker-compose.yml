services:
  # PostgreSQL Database
  postgres:
    image: postgres:latest
    container_name: farsight_postgres
    environment:
      # Single database configuration
      POSTGRES_DB: farsight
      POSTGRES_USER: farsight_user
      POSTGRES_PASSWORD: farsight_password
      PGDATA: /var/lib/postgresql/data/pgdata
      # Create additional database for Appsmith
      POSTGRES_MULTIPLE_DATABASES: farsight,appsmith_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/create-multiple-databases.sh:/docker-entrypoint-initdb.d/create-multiple-databases.sh
    ports:
      - "5432:5432"
    networks:
      - farsight_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farsight_user -d farsight"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Python Backend Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farsight_backend
    environment:
      DATABASE_URL: postgresql://farsight_user:farsight_password@postgres:5432/farsight
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - farsight_network
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Frontend Web Interface
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: farsight_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - farsight_network
    restart: unless-stopped

  # pgAdmin - Database Viewer
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: farsight_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@farsight.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_CONFIG_WTF_CSRF_ENABLED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    user: root
    depends_on:
      - postgres
    networks:
      - farsight_network
    restart: unless-stopped

  # Swagger UI - API Documentation
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: farsight_swagger
    environment:
      SWAGGER_JSON_URL: http://localhost:8000/openapi.json
      API_URL: http://localhost:8000/openapi.json
      BASE_URL: /swagger
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - farsight_network
    restart: unless-stopped

  # Appsmith - Low-code platform for building internal tools
  appsmith:
    image: appsmith/appsmith-ce:latest
    container_name: farsight_appsmith
    ports:
      - "8082:80"
    environment:
      # Redis configuration (Appsmith uses Redis for caching)
      APPSMITH_REDIS_URL: redis://redis:6379
      
      # Basic configuration for local development
      APPSMITH_ENCRYPTION_PASSWORD: farsight-appsmith-encryption-key-change-in-production
      APPSMITH_ENCRYPTION_SALT: farsight-appsmith-salt-change-in-production
      
      # Optional: Disable telemetry for privacy
      APPSMITH_DISABLE_TELEMETRY: true
      
      # Optional: Enable signup (set to false in production)
      APPSMITH_SIGNUP_DISABLED: false
    volumes:
      - appsmith_data:/appsmith-stacks
    depends_on:
      - redis
    networks:
      - farsight_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Redis - Required by Appsmith for caching and session management
  redis:
    image: redis:7-alpine
    container_name: farsight_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - farsight_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  pgadmin_data:

networks:
  farsight_network:
    driver: bridge
