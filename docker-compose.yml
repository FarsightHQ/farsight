services:
  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: farsight_postgres
    environment:
      # Single database configuration
      POSTGRES_DB: ${POSTGRES_DB:-farsight}
      POSTGRES_USER: ${POSTGRES_USER:-farsight_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - farsight_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-farsight_user} -d ${POSTGRES_DB:-farsight}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Keycloak - Authentication Server
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: farsight_keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-farsight}
      KC_DB_USERNAME: ${POSTGRES_USER:-farsight_user}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - farsight_network
    restart: unless-stopped
    # Realm JSON must stay in sync with KEYCLOAK_CLIENT_SECRET for farsight-backend
    command: start-dev --import-realm
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import
    healthcheck:
      # Keycloak image has no curl; check that the HTTP port accepts connections
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Python Backend Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farsight_backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PYTHONPATH: ${PYTHONPATH:-/app}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-farsight}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-farsight-backend}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - farsight_network
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # pgAdmin - Database Viewer
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: farsight_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@farsight.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_CONFIG_WTF_CSRF_ENABLED: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    user: root
    depends_on:
      - postgres
    networks:
      - farsight_network
    restart: unless-stopped

  # Swagger UI - API Documentation
  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: farsight_swagger
    environment:
      SWAGGER_JSON_URL: ${SWAGGER_JSON_URL:-http://localhost:8000/openapi.json}
      API_URL: ${API_URL:-http://localhost:8000/openapi.json}
      BASE_URL: ${BASE_URL:-/swagger}
    ports:
      - "${SWAGGER_PORT:-8081}:8080"
    depends_on:
      - backend
    networks:
      - farsight_network
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:

networks:
  farsight_network:
    driver: bridge
