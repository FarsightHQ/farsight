receivers:
  # OTLP receiver for gRPC and HTTP protocols
  # Backend services use gRPC (port 4317), frontend uses HTTP (port 4318)
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Host metrics receiver for container/system metrics
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
      disk:
      load:
      memory:
      network:
      process:
        mute_process_name_error: true

  # Prometheus receiver for SigNoz self-monitoring endpoints
  prometheus:
    config:
      scrape_configs:
        # OTEL Collector self-monitoring
        - job_name: 'otel-collector'
          scrape_interval: 30s
          static_configs:
            - targets: ['localhost:8888']
              labels:
                service: 'signoz-otel-collector'
        
        # ClickHouse metrics (if exposed via HTTP)
        - job_name: 'clickhouse'
          scrape_interval: 30s
          static_configs:
            - targets: ['clickhouse:8123']
              labels:
                service: 'signoz-clickhouse'
          metrics_path: '/metrics'
        
        # SigNoz Query Service metrics (if Prometheus endpoint available)
        - job_name: 'signoz-query-service'
          scrape_interval: 30s
          static_configs:
            - targets: ['signoz-query-service:8080']
              labels:
                service: 'signoz-query-service'
          metrics_path: '/api/v1/metrics'

processors:
  # Batch processor for efficient batching of telemetry data
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Resource processor for adding service metadata
  # Note: service.name is typically set by the application, but we can add fallbacks
  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert
      - key: telemetry.sdk.name
        value: opentelemetry
        action: upsert
      - key: telemetry.sdk.language
        value: otel-collector
        action: upsert

  # Attributes processor for adding custom attributes
  attributes:
    actions:
      - key: environment
        value: development
        action: upsert
      - key: collector.name
        value: farsight-otel-collector
        action: upsert

exporters:
  # ClickHouse exporter for traces, metrics, and logs
  clickhouse:
    endpoint: tcp://clickhouse:9000
    database: signoz
    username: default
    password: ""
    # 7-day TTL configuration
    ttl: 168h
    # Table names for different telemetry types
    traces_table_name: traces
    metrics_table_name: metrics
    logs_table_name: logs
    timeout: 5s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

service:
  pipelines:
    # Traces pipeline: OTLP → Processors → ClickHouse
    traces:
      receivers: [otlp]
      processors: [resource, attributes, batch]
      exporters: [clickhouse]
    
    # Metrics pipeline: OTLP, HostMetrics, Prometheus → Processors → ClickHouse
    metrics:
      receivers: [otlp, hostmetrics, prometheus]
      processors: [resource, attributes, batch]
      exporters: [clickhouse]
    
    # Logs pipeline: OTLP → Processors → ClickHouse
    logs:
      receivers: [otlp]
      processors: [resource, attributes, batch]
      exporters: [clickhouse]
  
  extensions: []
