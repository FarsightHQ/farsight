receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
      disk:
      load:
      memory:
      network:
      process:
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 30s
          static_configs:
            - targets: ['localhost:8888']

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  resource:
    attributes:
      - key: service.name
        value: signoz-otel-collector
        action: upsert
  attributes:
    actions:
      - key: environment
        value: development
        action: upsert

exporters:
  clickhouse:
    endpoint: tcp://clickhouse:9000
    database: signoz
    username: default
    password: ""
    ttl: 168h  # 7 days
    traces_table_name: traces
    metrics_table_name: metrics
    logs_table_name: logs
    timeout: 5s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, attributes, batch]
      exporters: [clickhouse]
    metrics:
      receivers: [otlp, hostmetrics, prometheus]
      processors: [resource, attributes, batch]
      exporters: [clickhouse]
    logs:
      receivers: [otlp]
      processors: [resource, attributes, batch]
      exporters: [clickhouse]
  extensions: []
