# Asset archetypes for test data generation.
# Maps to CSV columns consumed by AssetRegistryService._map_csv_row_to_asset().
# VLAN keys reference tests/testdata_generation/reference/network_topology.yaml.
schema_version: 1

description: >
  Twelve role profiles with weighted OS/hardware stacks, tool-agent strings, and
  security posture defaults. Generators pick environment from environment_distribution,
  then apply availability_by_environment and dmz_mz_by_zone using the asset's VLAN zone.

# Share of assets assigned to each environment (must sum to 100).
environment_distribution:
  - environment: Production
    weight: 50
  - environment: Staging
    weight: 15
  - environment: UAT
    weight: 10
  - environment: Development
    weight: 15
  - environment: DR
    weight: 10

# Availability label after environment is chosen.
availability_by_environment:
  Production: High
  Staging: Medium
  UAT: Medium
  Development: Low
  DR: High

# Maps topology zone (from VLAN) to DMZ/MZ column value.
dmz_mz_by_zone:
  DMZ: DMZ
  Application: MZ
  Database: MZ
  Management: Internal
  User: Internal

# Optional compliance tag sets (weighted). Generator picks 0–2 tags unless role overrides.
compliance_tag_pools:
  default:
    - tags: [SOC2]
      weight: 35
    - tags: [ISO27001]
      weight: 25
    - tags: [PCI-DSS]
      weight: 15
    - tags: [HIPAA]
      weight: 10
    - tags: [SOC2, ISO27001]
      weight: 15
  pci_heavy:
    - tags: [PCI-DSS, SOC2]
      weight: 50
    - tags: [PCI-DSS]
      weight: 35
    - tags: [ISO27001]
      weight: 15
  workstation_light:
    - tags: []
      weight: 40
    - tags: [SOC2]
      weight: 35
    - tags: [ISO27001]
      weight: 25

# Relative frequency when sampling roles (sum = 100).
roles:
  web-server:
    selection_weight: 15
    hostname_pattern: "web-{env_slug}-{seq:02d}"
    vm_display_name_pattern: "VM-web-{env_slug}-{seq:02d}"
    allowed_vlan_keys:
      - dc_east_dmz
      - dc_west_dmz
      - dc_east_app_prod
      - dc_west_app_dr
    os_choices:
      - os_name: Red Hat Enterprise Linux
        os_version: "8.10"
        weight: 45
      - os_name: Red Hat Enterprise Linux
        os_version: "9.4"
        weight: 30
      - os_name: Ubuntu Server
        os_version: "22.04 LTS"
        weight: 25
    vcpu_range: [2, 16]
    memory_gb_range: [4, 64]
    app_version_pool:
      - value: "nginx 1.24.x"
        weight: 40
      - value: "Apache httpd 2.4.x"
        weight: 35
      - value: "IIS 10.0"
        weight: 25
    db_version: null
    confidentiality: Internal
    integrity: Medium
    tool_update_pool:
      - value: "CrowdStrike Falcon 7.12"
        weight: 45
      - value: "Qualys Cloud Agent 4.8"
        weight: 30
      - value: "Tenable Nessus Agent 10.6"
        weight: 25
    itam_id_prefix: ITAM-WEB
    compliance_tag_pool_ref: default
    compliance_tag_pick_probability: 0.55

